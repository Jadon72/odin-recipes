<h1> Peanut Butter Mug Cake </h1>
<img src='https://media.istockphoto.com/id/938170492/photo/microwave-brownie-chocolate-mug-cake-ready-to-eat.jpg?s=1024x1024&w=is&k=20&c=YqwWBrWBHH0wIYTYA8-s9-aFf_WlxbV8KuPMvi83YOw=' alt="mug cake in a mug" width="85" />
<p> A simple one minute mug cake recipe!</p>
<UL>
<li>1 egg</li>
<li>3 tbsp peanut butter</li>
<li>2 tbsp sugar</li>
</UL>
<OL>
<li> mix egg, peanut butter, and sugar in a mug</li>
<li>microwave for one minute</li>
</OL>
<p> Enjoy!</p>
